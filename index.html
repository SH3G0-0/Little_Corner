<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wajeeha's Happy Place</title>
    <style>
        /* Storybook & UI Fonts */
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Quicksand:wght@400;600;700&display=swap');

        /* Cozy Game Palette */
        :root {
            --sky-top: #79C9FF;
            --sky-bottom: #DFF4FF;
            --grass-light: #86C86B;
            --grass-dark: #5FAF52;
            --wood: #7C5A3C;
            --stone: #B7B7B0;
            --sunlight: #FFE69B;
            --text-color: #5A4A78;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box; user-select: none;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><text y='20' font-size='20'>✨</text></svg>") 12 12, auto !important;
        }

        ::-webkit-scrollbar { display: none; }
        html, body { -ms-overflow-style: none; scrollbar-width: none; overflow: hidden; }

        body {
            background-color: var(--sky-top);
            font-family: 'Quicksand', sans-serif;
            color: var(--text-color);
        }

        /* --- THE WORLD ENGINE --- */
        #world {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden;
            background: radial-gradient(circle at 70% 30%, var(--sunlight) 0%, var(--sky-top) 30%, #2B6DE5 100%);
            transition: transform 1.5s cubic-bezier(0.25, 0.8, 0.25, 1), filter 1s ease;
            transform-origin: center bottom;
        }

        /* Cinematic Zoom Classes */
        .zoom-mailbox { transform: scale(1.35) translate(10vw, 15vh); filter: brightness(0.85); }
        .zoom-sign { transform: scale(1.35) translate(0vw, 15vh); filter: brightness(0.85); }
        .zoom-jar { transform: scale(1.35) translate(-15vw, 15vh); filter: brightness(0.85); }

        .layer { position: absolute; top: 0; left: -5vw; width: 110vw; height: 100vh; pointer-events: none; will-change: transform; }

        /* --- LAYER 1: SKY & BREATHING SUNLIGHT --- */
        #layer-sky { z-index: 1; }
        .sun-glow {
            position: absolute; top: 5%; right: 15%; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,230,155,0.45) 0%, transparent 60%);
            mix-blend-mode: screen; animation: pulse-light 6s ease-in-out infinite alternate;
        }
        .god-rays {
            position: absolute; top: -10%; right: -10vw; width: 80vw; height: 120vh;
            background: repeating-linear-gradient(45deg, rgba(255, 230, 155, 0.08) 0%, rgba(255, 230, 155, 0.08) 2%, transparent 2%, transparent 4%);
            mix-blend-mode: overlay; opacity: 0.6; transform: rotate(-15deg);
            animation: pulse-light 8s ease-in-out infinite alternate;
        }
        @keyframes pulse-light { 0% { opacity: 0.5; } 100% { opacity: 0.8; } }
        
        .cloud { position: absolute; filter: blur(1px); animation: drift linear infinite; opacity: 0.85; }
        @keyframes drift { 0% { transform: translateX(-10vw); } 100% { transform: translateX(110vw); } }

        /* --- LAYER 2: MOUNTAINS --- */
        #layer-mountains { z-index: 2; display: flex; align-items: flex-end; justify-content: space-around; opacity: 0.4; filter: blur(2px); bottom: 25%; height: 50%; }
        .mountain-silhouette { font-size: 35rem; line-height: 1; color: #89D6FF; text-shadow: 0 0 20px #89D6FF; }

        /* --- LAYER 3: MIDGROUND FOREST --- */
        #layer-forest { z-index: 3; bottom: 20%; height: 40%; display: flex; align-items: flex-end; opacity: 0.85; filter: blur(1px); }
        .bg-tree { font-size: 15rem; line-height: 1; margin: 0 -2vw; }

        /* --- LAYER 4: TERRAIN --- */
        #layer-ground { z-index: 4; }
        .terrain-base {
            position: absolute; bottom: -5vh; left: -5vw; width: 110vw; height: 35vh;
            background: linear-gradient(180deg, var(--grass-light) 0%, var(--grass-dark) 100%);
            border-radius: 50% 50% 0 0 / 20% 20% 0 0;
            box-shadow: inset 0 20px 40px rgba(255,255,255,0.2), 0 -10px 20px rgba(0,0,0,0.1);
        }

        /* --- LAYER 5: ENVIRONMENT SCENERY (Your Assets) --- */
        #layer-scenery { z-index: 5; }
        
        .main-tree-bridge {
            position: absolute; bottom: 15vh; right: 5vw; width: 600px; max-width: 45vw; height: auto;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3));
        }

        @keyframes sway-ground { 0% { transform: rotate(-2deg); } 100% { transform: rotate(2deg); } }
        .landscape-item {
            position: absolute; transform-origin: bottom center; animation: sway-ground 6s ease-in-out infinite alternate;
            pointer-events: none; opacity: 0.95; filter: drop-shadow(0 5px 15px rgba(90, 74, 120, 0.2));
        }

        /* Cottage & CSS Smoke */
        .cottage-wrapper {
            position: absolute; bottom: 22vh; left: 10vw; width: 380px; z-index: 5;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3));
        }
        .cottage-img { width: 100%; height: auto; }
        .chimney { position: absolute; top: 10%; left: 65%; z-index: -1; }
        .smoke {
            position: absolute; width: 30px; height: 30px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.6); filter: blur(8px);
            animation: smoke-anim 6s linear infinite;
        }
        .s2 { animation-delay: 2s; } .s3 { animation-delay: 4s; }
        @keyframes smoke-anim {
            0% { opacity: 0; transform: translateY(0) scale(0.3); }
            20% { opacity: 0.6; }
            100% { opacity: 0; transform: translateY(-150px) translateX(40px) scale(2.5); }
        }

        /* Scattered Mushrooms */
        .env-shroom { position: absolute; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); transform-origin: bottom center; animation: sway-ground 5s ease-in-out infinite alternate; }
        .shroom1 { bottom: 12vh; left: 35vw; width: 60px; }
        .shroom2 { bottom: 8vh; left: 8vw; width: 80px; transform: scaleX(-1); animation-duration: 7s; }
        .shroom3 { bottom: 15vh; right: 40vw; width: 50px; animation-duration: 4s; }

        /* --- LAYER 6: INTERACTIVE UI OBJECTS --- */
        #layer-objects { z-index: 6; pointer-events: none; }
        
        .interactive-prop {
            position: absolute; pointer-events: auto; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.3)); transform-origin: bottom center;
        }
        .interactive-prop:hover {
            transform: scale(1.1) translateY(-8px) rotate(-3deg);
            filter: drop-shadow(0 25px 30px rgba(0,0,0,0.4)) drop-shadow(0 0 20px rgba(255, 230, 155, 0.8));
        }

        .prop-mailbox { bottom: 18vh; left: 30vw; font-size: 8rem; line-height: 1; }
        .prop-sign { bottom: 12vh; left: 45vw; width: 160px; }
        .prop-jar { bottom: 15vh; right: 38vw; font-size: 6rem; line-height: 1; z-index: 2; }
        .stump { position: absolute; bottom: 8vh; right: 37vw; font-size: 7rem; line-height: 1; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); pointer-events: none; }

        .prop-gramophone { bottom: 18vh; left: 4vw; font-size: 6rem; line-height: 1; z-index: 6; }
        .prop-gramophone.playing { animation: wobble 2s infinite alternate; filter: drop-shadow(0 0 25px var(--sunlight)); }
        @keyframes wobble { 0% { transform: rotate(-3deg) scale(1.05); } 100% { transform: rotate(3deg) scale(1.05); } }

        /* --- LAYER 7: SWAYING FOREGROUND FRAMING --- */
        #layer-foreground { z-index: 7; filter: blur(3px) drop-shadow(0 30px 40px rgba(0,0,0,0.6)); pointer-events: none; }
        
        @keyframes sway-fg { 0% { transform: rotate(-2deg); } 100% { transform: rotate(2deg); } }
        
        .fg-sakura-left { position: absolute; top: -5vh; left: -5vw; width: 450px; transform-origin: top left; animation: sway-fg 8s ease-in-out infinite alternate; }
        .fg-sakura-right { position: absolute; top: -10vh; right: -10vw; width: 550px; transform-origin: top right; animation: sway-fg 9s ease-in-out infinite alternate-reverse; }
        .fg-floral-bottom { position: absolute; bottom: -5vh; right: -5vw; width: 400px; transform-origin: bottom right; animation: sway-fg 7s ease-in-out infinite alternate; }
        .fg-sakura-bottom { position: absolute; bottom: -10vh; left: -10vw; width: 350px; transform-origin: bottom left; animation: sway-fg 6s ease-in-out infinite alternate-reverse; }

        /* --- LAYER 8: PARTICLES (Petals & Fireflies) --- */
        #layer-particles { z-index: 8; pointer-events: none; }
        
        /* Petals using your JPG */
        .petal {
            position: absolute; width: 25px; height: 25px; opacity: 0.85;
            background-image: url('image_f3ad05.jpg'); background-size: cover;
            mix-blend-mode: multiply; /* Removes white background from JPG */
            animation: fall linear forwards; filter: drop-shadow(0 5px 5px rgba(246, 165, 201, 0.4));
        }
        @keyframes fall {
            0% { transform: translate(0, -10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.85; }
            90% { opacity: 0.85; }
            100% { transform: translate(-30vw, 110vh) rotate(360deg); opacity: 0; }
        }

        /* Magical Fireflies */
        .firefly {
            position: absolute; width: 6px; height: 6px; background: #FFF6CC; border-radius: 50%;
            box-shadow: 0 0 10px #FFE69B, 0 0 20px #FFE69B;
            animation: float-up linear forwards; mix-blend-mode: screen;
        }
        @keyframes float-up {
            0% { transform: translateY(10vh) translateX(0) scale(0); opacity: 0; }
            20% { opacity: 1; transform: translateY(-10vh) translateX(20px) scale(1); }
            80% { opacity: 1; transform: translateY(-40vh) translateX(-20px) scale(1); }
            100% { transform: translateY(-60vh) translateX(0) scale(0); opacity: 0; }
        }

        /* --- UI: Game Tooltip --- */
        #game-tooltip {
            position: fixed; padding: 10px 22px; border-radius: 12px;
            background: rgba(124, 90, 60, 0.95); color: var(--paper);
            font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.1rem;
            z-index: 9999; pointer-events: none; opacity: 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); border: 2px solid #5A3A20;
            transition: opacity 0.2s ease; transform: translate(-50%, -150%);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5); letter-spacing: 0.5px;
        }

        /* --- Loading Screen / Entrance --- */
        #storybook-cover {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--sky-top);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            z-index: 10000; transition: opacity 2s ease, transform 2s ease; cursor: pointer; 
        }
        .enter-btn {
            padding: 15px 45px; background: var(--wood); color: var(--paper); border-radius: 12px;
            font-size: 1.8rem; font-weight: bold; border: 3px solid #5A3A20; font-family: 'DM Serif Display', serif;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); animation: pulse 2.5s infinite alternate;
        }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); filter: brightness(1.2); } }

    </style>
</head>
<body>

    <!-- EXACT Audio Atmosphere Mapping based on your files -->
    <audio id="bg-dashboard" loop src="first-snow.mp3"></audio>
    <audio id="bg-smilebox" loop src="smilebox-ambient.mp3"></audio>
    <audio id="bg-happy" loop src="katawaredoki.mp3"></audio>
    <audio id="bg-sad" loop src="sparkle-piano.mp3"></audio>
    <audio id="sfx-rain" loop src="soft-rain.mp3"></audio>

    <!-- UI Tooltip -->
    <div id="game-tooltip"></div>

    <!-- Entrance -->
    <div id="storybook-cover" onclick="enterWorld()">
        <div class="enter-btn">Enter World</div>
    </div>

    <!-- THE LIVING WORLD ENGINE -->
    <div id="world">
        
        <!-- Layer 1: Sky & Atmosphere -->
        <div class="layer" id="layer-sky">
            <div class="sun-glow"></div>
            <div class="god-rays"></div>
            <div class="cloud" style="top: 15%; font-size: 12rem; animation-duration: 120s;">☁️</div>
            <div class="cloud" style="top: 30%; font-size: 8rem; animation-duration: 80s; animation-delay: -40s; opacity: 0.5;">☁️</div>
        </div>

        <!-- Layer 2: Distant Mountains -->
        <div class="layer" id="layer-mountains">
            <div class="mountain-silhouette">⛰️</div>
            <div class="mountain-silhouette" style="font-size: 45rem; margin-bottom: -10vh;">⛰️</div>
            <div class="mountain-silhouette">⛰️</div>
        </div>

        <!-- Layer 3: Midground Forest -->
        <div class="layer" id="layer-forest">
            <div class="bg-tree">🌲</div><div class="bg-tree">🌳</div><div class="bg-tree">🌲</div>
            <div class="bg-tree">🌳</div><div class="bg-tree">🌲</div><div class="bg-tree">🌳</div>
        </div>

        <!-- Layer 4: Terrain / Ground -->
        <div class="layer" id="layer-ground">
            <div class="terrain-base"></div>
        </div>

        <!-- Layer 5: Scenery & Architecture (Your Exact Files) -->
        <div class="layer" id="layer-scenery">
            <img src="image_f3adc0.png" class="main-tree-bridge landscape-item" alt="Bridge Tree">
            <img src="image_f3b181.png" class="env-shroom shroom1" alt="Mushroom">
            <img src="image_f3b1a2.png" class="env-shroom shroom2" alt="Mushroom">
            <img src="image_f3b181.png" class="env-shroom shroom3" alt="Mushroom">
            
            <!-- Cottage with Dynamic Smoke -->
            <div class="cottage-wrapper landscape-item">
                <div class="chimney">
                    <div class="smoke s1"></div>
                    <div class="smoke s2"></div>
                    <div class="smoke s3"></div>
                </div>
                <img src="cottage.png" class="cottage-img" alt="Cottage">
            </div>
        </div>

        <!-- Layer 6: Interactive Objects (The "Menu") -->
        <div class="layer" id="layer-objects">
            
            <!-- 1. Music Player -->
            <div id="gramophone" class="interactive-prop prop-gramophone" onclick="toggleWorldMusic()" onmousemove="moveToast(event, '📻 Play Ambience')" onmouseleave="hideToast()">📻</div>

            <!-- 2. Letters Mailbox -->
            <div id="mailbox" class="interactive-prop prop-mailbox" onclick="openGameMenu('letters')" onmousemove="moveToast(event, '📮 Check the Mail')" onmouseleave="hideToast()">📮</div>

            <!-- 3. Smile Box Sign -->
            <img src="image_f3b483.png" id="sign" class="interactive-prop prop-sign" onclick="openGameMenu('smilebox')" onmousemove="moveToast(event, '🪵 Open Smile Box')" onmouseleave="hideToast()" alt="Wooden Sign">

            <!-- 4. Happy Jar & Stump -->
            <div class="stump">🪵</div>
            <div id="jar" class="interactive-prop prop-jar" onclick="openGameMenu('jar')" onmousemove="moveToast(event, '🍯 Pick a Happy Note')" onmouseleave="hideToast()">🫙</div>

        </div>

        <!-- Layer 7: Foreground Framing (Your Exact Files) -->
        <div class="layer" id="layer-foreground">
            <img src="image_f3ad47.png" class="fg-sakura-left" alt="Sakura">
            <img src="image_f3b128.png" class="fg-sakura-right" alt="Sakura">
            <img src="image_f3b103.png" class="fg-floral-bottom" alt="Flowers">
            <img src="image_f3b0cb.png" class="fg-sakura-bottom" alt="Sakura Cluster">
        </div>

        <!-- Layer 8: Magical Particles -->
        <div class="layer" id="layer-particles"></div>

    </div>

    <!-- Linked External Logic -->
    <script src="smilebox.js"></script>
    <script src="letters.js"></script>

    <script>
        // --- GAME UI: TOOLTIP ---
        const tooltip = document.getElementById('game-tooltip');
        function moveToast(e, text) {
            tooltip.innerText = text;
            tooltip.style.opacity = '1';
            tooltip.style.left = e.clientX + 'px';
            tooltip.style.top = (e.clientY - 25) + 'px';
        }
        function hideToast() { tooltip.style.opacity = '0'; }

        // --- PARALLAX ENGINE ---
        const sceneLayers = [
            { el: document.getElementById('layer-mountains'), speed: 3 },
            { el: document.getElementById('layer-forest'), speed: 8 },
            { el: document.getElementById('layer-ground'), speed: 18 },
            { el: document.getElementById('layer-scenery'), speed: 18 },
            { el: document.getElementById('layer-objects'), speed: 22 },
            { el: document.getElementById('layer-foreground'), speed: 50 }
        ];

        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5);
            const y = (e.clientY / window.innerHeight - 0.5);

            sceneLayers.forEach(layer => {
                if(layer.el) {
                    layer.el.style.transform = `translate(${x * layer.speed}vw, ${y * layer.speed}vh)`;
                }
            });
        });

        // --- PARTICLE ENGINE (Petals & Fireflies) ---
        const particleLayer = document.getElementById('layer-particles');

        function spawnPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = (Math.random() * 120 - 10) + 'vw';
            petal.style.width = petal.style.height = (15 + Math.random() * 25) + 'px';
            petal.style.animationDuration = (12 + Math.random() * 15) + 's'; 
            particleLayer.appendChild(petal);
            setTimeout(() => { petal.remove(); }, 28000); 
        }

        function spawnFirefly() {
            const firefly = document.createElement('div');
            firefly.className = 'firefly';
            firefly.style.left = (Math.random() * 100) + 'vw';
            firefly.style.bottom = (Math.random() * 20) + 'vh';
            firefly.style.animationDuration = (8 + Math.random() * 8) + 's';
            particleLayer.appendChild(firefly);
            setTimeout(() => { firefly.remove(); }, 16000);
        }

        setInterval(spawnPetal, 900); 
        setInterval(spawnFirefly, 1500);

        // --- WORLD ENTRY ---
        function enterWorld() {
            const cover = document.getElementById('storybook-cover');
            cover.style.opacity = '0';
            cover.style.transform = 'scale(1.2)'; 
            
            toggleWorldMusic(true); 
            
            setTimeout(() => { cover.style.display = 'none'; }, 2000);
        }

        // --- INTERACTION & CINEMATIC CAMERA ZOOM ---
        const world = document.getElementById('world');

        function openGameMenu(type) {
            hideToast();
            
            if (type === 'letters') {
                world.className = 'zoom-mailbox';
                setTimeout(() => { if(window.openLetters) window.openLetters(); }, 1200);
            } 
            else if (type === 'smilebox') {
                world.className = 'zoom-sign';
                setTimeout(() => { if(window.startSmileBox) window.startSmileBox(); }, 1200);
            }
            else if (type === 'jar') {
                world.className = 'zoom-jar';
                setTimeout(() => { alert("The Happy Jar opens... (Attach to jar logic)"); world.className = ''; }, 1200);
            }
        }

        const originalCloseDrawer = window.closeDrawer;
        window.closeDrawer = function() {
            if(originalCloseDrawer) originalCloseDrawer();
            world.className = ''; 
        };

        // --- AMBIENT AUDIO ENGINE ---
        let isPlaying = false;
        function toggleWorldMusic(forcePlay = false) {
            const playerUI = document.getElementById('gramophone');
            const dashboardMusic = document.getElementById('bg-dashboard');

            if (isPlaying && !forcePlay) {
                if (window.stopAllMusic) { window.stopAllMusic(); } 
                else if (dashboardMusic) { dashboardMusic.pause(); dashboardMusic.volume = 0; }
                playerUI.classList.remove('playing');
                isPlaying = false;
            } else {
                const trackToResume = (window.currentTrack && !window.currentTrack.paused) ? window.currentTrack : dashboardMusic;
                if (trackToResume) {
                    trackToResume.play().catch(e => console.log("Playback blocked:", e));
                    playerUI.classList.add('playing');
                    
                    let fade = setInterval(() => {
                        if (trackToResume.volume < 0.15) {
                            trackToResume.volume = Math.min(trackToResume.volume + 0.01, 0.15);
                        } else { clearInterval(fade); }
                    }, 50);
                    isPlaying = true;
                }
            }
        }
    </script>
</body>
</html>
