<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wajeeha's Happy Place</title>
    <style>
        /* Storybook Fonts */
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Quicksand:wght@400;600;700&display=swap');

        /* Cozy World Palette */
        :root {
            --sky-top: #8FD4FF;
            --sky-bottom: #FFF8F0;
            --grass-light: #8BCB74;
            --grass-dark: #5A8D58;
            --wood: #8A6240;
            --paper: #F4E9DA;
            --text-color: #5A4A78;
        }

        /* --- Global Reset & Cursor --- */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><text y='20' font-size='20'>✨</text></svg>") 12 12, auto !important;
            user-select: none;
        }

        body {
            background-color: var(--sky-top);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden; /* No scrolling in the game world */
            color: var(--text-color);
        }

        /* --- THE WORLD ENGINE (Parallax Container) --- */
        #world {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 60%);
        }

        /* --- Layer 1: Sky & Lighting --- */
        .sun-glow {
            position: absolute;
            top: 10%; right: 20%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255,255,210,0.6) 0%, transparent 70%);
            z-index: 1; pointer-events: none;
        }

        #cloud-layer {
            position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none;
        }

        .cloud {
            position: absolute; font-size: 5rem; opacity: 0.8; filter: blur(1px);
            animation: float-clouds linear infinite;
        }
        @keyframes float-clouds { from { transform: translateX(-20vw); } to { transform: translateX(110vw); } }

        /* --- Layer 2: Distant Mountains --- */
        #mountain-layer {
            position: absolute; bottom: 25%; width: 100%; height: 40%; z-index: 3;
            display: flex; justify-content: space-around; align-items: flex-end; opacity: 0.4;
            filter: blur(2px) drop-shadow(0 -10px 20px rgba(143, 212, 255, 0.5));
            pointer-events: none; will-change: transform;
        }
        .mountain { font-size: 25rem; line-height: 1; margin: 0 -50px; }

        /* --- Layer 3: Forest --- */
        #forest-layer {
            position: absolute; bottom: 20%; width: 100%; height: 30%; z-index: 4;
            display: flex; justify-content: space-between; align-items: flex-end; opacity: 0.7;
            filter: blur(1px); pointer-events: none; will-change: transform;
        }
        .bg-tree { font-size: 12rem; line-height: 1; }

        /* --- Layer 4: The Ground / Terrain --- */
        #ground-layer {
            position: absolute; bottom: -5%; left: -5%; width: 110%; height: 35%; z-index: 5;
            background: linear-gradient(180deg, var(--grass-light) 0%, var(--grass-dark) 100%);
            border-radius: 50% 50% 0 0;
            box-shadow: inset 0 20px 50px rgba(255,255,255,0.2), 0 -10px 30px rgba(90, 141, 88, 0.3);
            will-change: transform; pointer-events: none;
        }

        /* --- Layer 5: The House & Objects --- */
        #object-layer {
            position: absolute; bottom: 15%; width: 100%; height: 50%; z-index: 6;
            will-change: transform; pointer-events: none; /* Let clicks pass through empty space */
        }

        /* Ambient swaying for natural objects */
        @keyframes sway { 0% { transform: rotate(-2deg); } 100% { transform: rotate(2deg); } }

        .world-object {
            position: absolute; transform-origin: bottom center; line-height: 1;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.15)) drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .cottage { font-size: 22rem; bottom: 5%; left: 15%; pointer-events: auto; }
        .path { font-size: 8rem; bottom: -20%; left: 28%; transform: rotate(15deg) scaleY(0.5); filter: brightness(0.9); }

        /* INTERACTIVE OBJECTS (The "Buttons") */
        .interactive {
            pointer-events: auto; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: absolute; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.2));
        }
        
        .interactive:hover {
            transform: scale(1.1) translateY(-10px) rotate(-3deg) !important;
            filter: drop-shadow(0 25px 35px rgba(0,0,0,0.3)) drop-shadow(0 0 15px rgba(255,255,255,0.6));
        }

        /* Mailbox (Letters) */
        #mailbox { font-size: 8rem; bottom: 5%; left: 45%; }
        
        /* Table & Jar (Happy Jar) */
        .stump { position: absolute; font-size: 6rem; bottom: 2%; left: 60%; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.2)); }
        #jar { font-size: 5rem; bottom: 18%; left: 61.5%; z-index: 2; }

        /* Basket (Smile Box) */
        #basket { font-size: 7rem; bottom: -5%; left: 35%; }

        /* Gramophone / Radio (Music) */
        #gramophone { font-size: 6rem; bottom: 10%; left: 75%; }
        #gramophone.playing { animation: bounce-play 1s infinite alternate; }
        @keyframes bounce-play { 0% { transform: scale(1) translateY(0); } 100% { transform: scale(1.05) translateY(-5px); } }

        /* Trees to flesh out the midground */
        .tree-mid { font-size: 14rem; bottom: 10%; right: 5%; animation: sway 6s ease-in-out infinite alternate; pointer-events: none;}
        .tree-mid-2 { font-size: 18rem; bottom: 15%; left: -2%; animation: sway 7s ease-in-out infinite alternate; pointer-events: none;}

        /* --- Layer 6: Foreground (Depth of Field) --- */
        #foreground-layer {
            position: absolute; bottom: -10%; width: 110%; left: -5%; height: 25%; z-index: 7;
            display: flex; justify-content: space-around; align-items: flex-end;
            filter: blur(3px) drop-shadow(0 20px 30px rgba(0,0,0,0.4));
            pointer-events: none; will-change: transform;
        }
        .fg-grass { font-size: 15rem; line-height: 0.5; margin: 0 -20px; animation: sway 4s ease-in-out infinite alternate; transform-origin: bottom; }
        .fg-flower { font-size: 10rem; line-height: 0.5; animation: sway 5s ease-in-out infinite alternate; transform-origin: bottom; }

        /* --- Layer 7: Particles & VFX --- */
        #particles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 8; pointer-events: none;
        }
        .leaf {
            position: absolute; font-size: 1.5rem; opacity: 0.6; filter: hue-rotate(40deg);
            animation: falling-leaf linear forwards;
        }
        @keyframes falling-leaf {
            0% { transform: translate(0, -10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translate(-20vw, 110vh) rotate(360deg); opacity: 0; }
        }

        /* --- Game UI: Hover Toast --- */
        #hover-toast {
            position: fixed; padding: 10px 20px; border-radius: 20px;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
            color: var(--wood); font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.1rem;
            z-index: 1000; pointer-events: none; opacity: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 2px solid var(--paper);
            transition: opacity 0.2s ease, transform 0.1s linear; transform: translate(-50%, -150%);
        }

        /* --- Loading / Storybook Cover --- */
        #storybook-cover {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-gradient);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            z-index: 2000; transition: opacity 1.5s ease, transform 1.5s ease; cursor: pointer; 
        }
        .storybook-text {
            max-width: 500px; padding: 40px; background: rgba(255, 255, 255, 0.4); border-radius: 30px;
            backdrop-filter: blur(10px); border: 2px solid var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); animation: gentleFloat 4s ease-in-out infinite;
        }
        .storybook-text h1 { font-size: 2.8rem; margin: 10px 0; color: var(--text-color); font-family: 'DM Serif Display', serif; }
        .storybook-text p { font-size: 1.2rem; line-height: 1.8; margin: 20px 0; }
        .storybook-text .hint { font-size: 0.9rem; opacity: 0.6; margin-top: 30px; font-style: italic; }
        @keyframes gentleFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        /* Camera Zoom Effect */
        .zoom-in { transform: scale(1.4) translateY(10%); transition: transform 2s cubic-bezier(0.25, 0.8, 0.25, 1); }

    </style>
</head>
<body>

    <!-- Audio Assets -->
    <audio id="bg-dashboard" loop src="first-snow.mp3"></audio>
    <audio id="bg-smilebox" loop src="smilebox-ambient.mp3"></audio>
    <audio id="bg-happy" loop src="zenzenzense-piano.mp3"></audio>
    <audio id="bg-sad" loop src="sparkle-piano.mp3"></audio>
    <audio id="bg-katawaredoki" loop src="katawaredoki.mp3"></audio>
    <audio id="sfx-rain" loop src="soft-rain.mp3"></audio>

    <!-- Game UI Toast -->
    <div id="hover-toast"></div>

    <!-- Entrance -->
    <div id="storybook-cover" onclick="enterWorld()">
        <div class="storybook-text">
            <div style="font-size: 2rem;">🌸</div>
            <h1>Welcome to Your Happy Place</h1>
            <p>A little corner of the world made just for you.<br>It'll always be here whenever you need to visit.</p>
            <div class="hint">( Click anywhere to enter )</div>
        </div>
    </div>

    <!-- THE LIVING WORLD -->
    <div id="world">
        
        <!-- Layer 1 -->
        <div class="sun-glow"></div>
        <div id="cloud-layer">
            <div class="cloud" style="top: 10%; animation-duration: 90s; font-size: 6rem;">☁️</div>
            <div class="cloud" style="top: 25%; animation-duration: 120s; font-size: 4rem; animation-delay: -30s; filter:blur(2px); opacity:0.5;">☁️</div>
            <div class="cloud" style="top: 15%; animation-duration: 75s; font-size: 8rem; animation-delay: -60s;">☁️</div>
        </div>

        <!-- Layer 2 -->
        <div id="mountain-layer">
            <div class="mountain">⛰️</div>
            <div class="mountain" style="font-size: 35rem;">⛰️</div>
            <div class="mountain">⛰️</div>
        </div>

        <!-- Layer 3 -->
        <div id="forest-layer">
            <div class="bg-tree" style="margin-left: -50px;">🌲</div>
            <div class="bg-tree">🌳</div>
            <div class="bg-tree" style="font-size: 15rem; margin-bottom: 20px;">🌲</div>
            <div class="bg-tree">🌳</div>
            <div class="bg-tree" style="margin-right: -50px;">🌲</div>
        </div>

        <!-- Layer 4 -->
        <div id="ground-layer"></div>

        <!-- Layer 5: Interactive Environment -->
        <!-- 💡 CSS is designed so you can replace the innerHTML (emojis) with <img src="assets/..."> later -->
        <div id="object-layer">
            
            <div class="world-object tree-mid-2">🌳</div>
            <div class="world-object path">🪨</div>
            <div class="world-object cottage">🏡</div>
            <div class="world-object tree-mid">🌸</div>

            <!-- The Mailbox (Letters) -->
            <div id="mailbox" class="interactive" onclick="openLettersWorld()" onmousemove="moveToast(event, '📮 Check the Mail')" onmouseleave="hideToast()">
                📮
            </div>

            <!-- The Flower Basket (Smile Box) -->
            <div id="basket" class="interactive" onclick="startSmileBoxWorld()" onmousemove="moveToast(event, '🌸 Open the Smile Box')" onmouseleave="hideToast()">
                🧺
            </div>

            <!-- The Stump and Jar (Happy Jar) -->
            <div class="world-object stump">🪵</div>
            <div id="jar" class="interactive" onclick="alert('The Happy Jar opens...')" onmousemove="moveToast(event, '🍯 Pick a Happy Note')" onmouseleave="hideToast()">
                🫙
            </div>

            <!-- The Gramophone (Music) -->
            <div id="gramophone" class="interactive" onclick="toggleWorldMusic()" onmousemove="moveToast(event, '📻 Play a Song')" onmouseleave="hideToast()">
                📻
            </div>

        </div>

        <!-- Layer 6: Depth of Field Foreground -->
        <div id="foreground-layer">
            <div class="fg-grass">🌿</div>
            <div class="fg-flower">🌷</div>
            <div class="fg-grass" style="font-size: 20rem; margin-bottom: -50px;">🌿</div>
            <div class="fg-flower">🌼</div>
            <div class="fg-grass">🌿</div>
        </div>

        <!-- Layer 7: Particles -->
        <div id="particles"></div>

    </div>

    <!-- Scripts -->
    <script src="smilebox.js"></script>
    <script src="letters.js"></script>

    <script>
        // --- GAME UI: TOAST FOLLOWING MOUSE ---
        const toast = document.getElementById('hover-toast');
        
        function moveToast(e, text) {
            toast.innerText = text;
            toast.style.opacity = '1';
            toast.style.left = e.clientX + 'px';
            toast.style.top = e.clientY + 'px';
        }
        function hideToast() {
            toast.style.opacity = '0';
        }

        // --- PARALLAX ENGINE ---
        const layers = {
            mountains: document.getElementById('mountain-layer'),
            forest: document.getElementById('forest-layer'),
            ground: document.getElementById('ground-layer'),
            objects: document.getElementById('object-layer'),
            foreground: document.getElementById('foreground-layer')
        };

        window.addEventListener('mousemove', (e) => {
            // Calculate mouse position relative to center of screen (-0.5 to 0.5)
            const x = (e.clientX / window.innerWidth - 0.5);
            const y = (e.clientY / window.innerHeight - 0.5);

            // Apply different translation speeds to simulate 3D depth
            layers.mountains.style.transform = `translate(${x * 15}px, ${y * 10}px)`;
            layers.forest.style.transform = `translate(${x * 30}px, ${y * 15}px)`;
            layers.ground.style.transform = `translate(${x * 50}px, ${y * 20}px)`;
            layers.objects.style.transform = `translate(${x * 50}px, ${y * 20}px)`; // Matches ground
            layers.foreground.style.transform = `translate(${x * 120}px, ${y * 60}px)`; // Moves fastest
        });

        // --- PARTICLE ENGINE (Falling Leaves) ---
        function spawnLeaf() {
            const particleLayer = document.getElementById('particles');
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.innerText = '🍃';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = (8 + Math.random() * 10) + 's'; // 8-18 seconds
            
            particleLayer.appendChild(leaf);

            // Remove leaf after animation completes
            setTimeout(() => { leaf.remove(); }, 18000);
        }
        // Spawn a leaf every 2 seconds
        setInterval(spawnLeaf, 2000);

        // --- WORLD ENTRY ---
        function enterWorld() {
            const cover = document.getElementById('storybook-cover');
            cover.style.opacity = '0';
            cover.style.transform = 'scale(1.1)'; 
            
            toggleWorldMusic(true); // Auto-play music on entry
            
            setTimeout(() => {
                cover.style.display = 'none';
            }, 1500);
        }

        // --- MUSIC ENGINE ---
        let isPlaying = false;
        function toggleWorldMusic(forcePlay = false) {
            const playerUI = document.getElementById('gramophone');
            const dashboardMusic = document.getElementById('bg-dashboard');

            if (isPlaying && !forcePlay) {
                if (window.stopAllMusic) { window.stopAllMusic(); } 
                else {
                    if(dashboardMusic) { dashboardMusic.pause(); dashboardMusic.volume = 0; }
                }
                playerUI.classList.remove('playing');
                isPlaying = false;
            } else {
                const trackToResume = (window.currentTrack && !window.currentTrack.paused) ? window.currentTrack : dashboardMusic;
                if (trackToResume) {
                    trackToResume.play().catch(e => console.log("Playback blocked:", e));
                    playerUI.classList.add('playing');
                    
                    let fade = setInterval(() => {
                        if (trackToResume.volume < 0.15) {
                            trackToResume.volume = Math.min(trackToResume.volume + 0.01, 0.15);
                        } else { clearInterval(fade); }
                    }, 50);
                    isPlaying = true;
                }
            }
        }

        // --- INTERACTION HOOKS ---
        const world = document.getElementById('world');

        // Letters
        function openLettersWorld() {
            hideToast();
            world.classList.add('zoom-in'); // Cinematic zoom
            setTimeout(() => {
                window.openLetters(); // Calls your letters.js function
                world.classList.remove('zoom-in'); // Reset zoom for when drawer closes
            }, 800);
        }

        // Smile Box
        function startSmileBoxWorld() {
            hideToast();
            world.classList.add('zoom-in');
            setTimeout(() => {
                window.startSmileBox(); // Calls your smilebox.js function
                world.classList.remove('zoom-in');
            }, 800);
        }

    </script>
</body>
</html>
